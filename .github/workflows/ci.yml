name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  database:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.5-pg16
        env:
          POSTGRES_DB: astroscout
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d astroscout"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: astroscout
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap Supabase roles
        run: psql -X -v ON_ERROR_STOP=1 -f supabase/tests/bootstrap.sql
      - name: Replay migrations
        run: |
          for migration in supabase/migrations/*.sql; do
            psql -X -v ON_ERROR_STOP=1 -f "$migration"
          done
      - name: Verify repair migration is idempotent
        run: psql -X -v ON_ERROR_STOP=1 -f supabase/migrations/0005_privileges_and_rls_repair.sql
      - name: Verify Track C privileges, CRUD, RLS, and RPC
        run: psql -X -v ON_ERROR_STOP=1 -f supabase/tests/track_c_acceptance.sql
      - name: Verify authenticated chat quota and usage accounting
        run: psql -X -v ON_ERROR_STOP=1 -f supabase/tests/chat_usage_acceptance.sql

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest -m "not integration"

  # Auto-activates once apps/web/package.json exists. Installs from the workspace
  # root (single pnpm-lock.yaml) and targets the web package with --filter.
  web:
    runs-on: ubuntu-latest
    if: hashFiles('apps/web/package.json') != ''
    env:
      # CI installs deps explicitly below, so skip pnpm's pre-run auto-install check.
      npm_config_verify_deps_before_run: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @astroscout/web lint
      - run: pnpm --filter @astroscout/web typecheck
      - run: pnpm --filter @astroscout/web test
      - run: pnpm --filter @astroscout/web build
